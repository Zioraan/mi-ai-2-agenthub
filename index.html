<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentHub Admin Panel</title>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="app" class="min-h-screen flex">
      <aside class="hidden md:flex md:w-64 md:shrink-0 border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
        <div class="w-full flex flex-col">
          <div class="h-16 px-5 flex items-center border-b border-slate-200 dark:border-slate-800">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white text-sm font-bold">AH</span>
            <span class="ml-2 text-sm font-semibold tracking-wide">AgentHub</span>
          </div>
          <nav id="desktopNav" class="p-3 space-y-1"></nav>
        </div>
      </aside>

      <div class="flex-1 min-w-0 flex flex-col">
        <header class="sticky top-0 z-30 h-16 border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
          <div class="h-full px-4 md:px-6 flex items-center gap-3">
            <button id="mobileMenuBtn" type="button" class="md:hidden inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800" aria-label="Open navigation menu">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <h1 id="topTitle" class="text-base md:text-lg font-semibold">Dashboard</h1>
            <div class="flex-1"></div>
            <button id="themeBtn" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800" aria-label="Switch to dark mode">
              <span id="themeIcon" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <main id="content" class="flex-1 overflow-y-auto p-4 md:p-6">
          <section data-panel="dashboard"></section>
          <section data-panel="users" class="hidden"></section>
          <section data-panel="agents" class="hidden"></section>
          <section data-panel="skills" class="hidden"></section>
          <section data-panel="contracts" class="hidden"></section>
          <section data-panel="errors" class="hidden"></section>
        </main>
      </div>
    </div>

    <div id="mobileDrawer" class="fixed inset-0 z-40 hidden md:hidden" aria-hidden="true">
      <button id="mobileBackdrop" type="button" class="absolute inset-0 bg-black/50" aria-label="Close navigation menu"></button>
      <aside class="relative h-full w-72 max-w-[85vw] border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
        <div class="h-16 px-5 flex items-center border-b border-slate-200 dark:border-slate-800">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white text-sm font-bold">AH</span>
          <span class="ml-2 text-sm font-semibold tracking-wide">AgentHub</span>
        </div>
        <nav id="mobileNav" class="p-3 space-y-1"></nav>
      </aside>
    </div>

    <div id="dropdownPortal" class="fixed inset-0 z-[60] pointer-events-none"></div>

    <div id="modalRoot" class="fixed inset-0 z-[70] hidden" aria-hidden="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
